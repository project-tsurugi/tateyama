syntax = "proto3";

package tateyama.proto.endpoint.response;

option java_multiple_files = false;
option java_package = "com.tsurugidb.endpoint.proto";
option java_outer_classname = "EndpointResponse";

import "tateyama/proto/diagnostics.proto";

// unknown error was occurred.
message Error {
    // the error message.
    string message = 1;

    // error code
    diagnostics.Code code = 2;

    // supplemental text for debug purpose
    string supplemental_text = 4;
}

// handshake operation.
message Handshake {
    reserved 1 to 10;

    // the response body.
    oneof result {
        // request is successfully completed.
        Success success = 11;

        // unknown error was occurred.
        Error error = 12;
    }

    // request is successfully completed.
    message Success {
        // the session id.
        uint64 session_id = 11;

        // the user name.
        oneof user_name_opt {
            string user_name = 12;
        }

        // the BLOB transfer info
        oneof blob_transfer_info_opt {
            // true if privileged mode is available
            bool privileged_mode = 13;

            // information for using the BLOB relay service
            BLOBRelayInfo blob_relay_info = 14;
        }
    }
}

message BLOBRelayInfo {
    // the endpoint URI for BLOB relay service
    // Concretely, the string set at `grpc_server.endpoint` in `tsurugi.ini`
    string endpoint = 1;

    // the grpc server uses secure port
    // Concretely, the value of `grpc_server.secure` in `tsurugi.ini`
    bool secure = 2;

    // the BLOB session id
    uint64 blob_session_id = 3;
}

// get the encryption key.
message EncryptionKey {
    reserved 1 to 10;

    // the response body.
    oneof result {
        // request is successfully completed.
        Success success = 11;

        // an unknown error occurred.
        Error error = 12;
    }

    // request is successfully completed.
    message Success {
        // the the encryption key.
        string encryption_key = 11;
    }
}

// update the credential
message UpdateAuthentication {
    reserved 1 to 10;

    // the response body.
    oneof result {
        // request is successfully completed.
        Success success = 11;

        // unknown error was occurred.
        Error error = 12;
    }

    // request is successfully completed.
    message Success {
        // no special properties.
    }
}

// get the expiration time of the current session credential
message GetAuthenticationExpirationTime {
    reserved 1 to 10;

    // the response body.
    oneof result {
        // request is successfully completed.
        Success success = 11;

        // unknown error was occurred.
        Error error = 12;
    }

    // request is successfully completed.
    message Success {
        // expiration time of the session, expressed as the number of milliseconds since epoch 1970-01-01T00:00:00Z.
        uint64 expiration_time = 1;
    }
}
