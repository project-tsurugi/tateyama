syntax = "proto3";

package tateyama.proto.framework.common;

option java_multiple_files = false;
option java_package = "com.tsurugidb.framework.proto";
option java_outer_classname = "FrameworkCommon";

// Blob info.
message BlobInfo {

    // the channel name.
    string channel_name = 1;

    // information indicating the location of the BLOB file.
    oneof blob_location {
        // the file path.
        string path = 2;

        // the reference to the BLOB.
        BlobReferenceForBlobRelay blob = 4;
    }

    // whether file is temporary.
    bool temporary = 3;
}

message RepeatedBlobInfo {
    repeated BlobInfo blobs = 1;
}

message BlobReferenceForBlobRelay {

    // The storage_id field in data_relay_grpc's BlobReference is meaningful only for download operations via Get().
    // It is unnecessary for upload operations since it is fixed to SESSION_STORAGE.
    reserved 1;

    // the ID of the object within the BLOB storage.
    uint64 object_id = 2;

    // a tag for additional access control.
    uint64 tag = 3;
}
